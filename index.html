<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="orientation" content="portrait" />
  <title>胆小除魔师 / 下一间</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      touch-action: none;
    }
    #boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #111;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="boot">加载中...</div>
  <script>
    window.addEventListener('load', function () {
      const boot = document.getElementById('boot');
      if (boot) boot.remove();
    });
  </script>
  <script src="./game.js"></script>
</body>
</html>
